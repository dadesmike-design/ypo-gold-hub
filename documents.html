<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Documents</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="container"><div class="hero"><div><h1>Governing Documents</h1><p class="sub">Bylaws, policies, meeting minutes, templates, and reference docs.</p></div><button class="btn primary" onclick="openDoc()">Add Document</button></div><input id="q" class="input" placeholder="Search title or description"><div id="tabs" class="tabs"></div><h2>Pinned Documents</h2><div id="pinned" class="grid three"></div><h2>Library</h2><div id="docs" class="grid three"></div></main><div id="modal" class="modal-backdrop hidden"></div><script src="auth.js"></script><script>loadNav('documents');footer();let cat='All',editing=null,cats=['All','Bylaws','Policies','Meeting Minutes','Templates','Reference','Other'];function filtered(){let s=q.value.toLowerCase();return getStore('ypo_docs',[]).filter(d=>(cat==='All'||d.category===cat)&&(!s||(d.title+d.description).toLowerCase().includes(s)))}function card(d){return `<article class="card ${d.pinned?'featured':''}"><h3>${escapeHtml(d.title)}</h3><p class="sub">${escapeHtml(d.description)}</p><p><span class="badge">${d.category}</span> <span class="badge">v${escapeHtml(d.version)}</span></p><p class="sub">Last Updated: ${d.date}</p><div class="toolbar"><a class="btn" href="${escapeHtml(d.url)}" target="_blank">Open</a><button class="btn" onclick="pin('${d.id}')">${d.pinned?'Unpin':'Pin'}</button><button class="btn" onclick="openDoc('${d.id}')">Edit</button><button class="btn danger" onclick="del('${d.id}')">Delete</button></div></article>`}function render(){tabs.innerHTML=cats.map(c=>`<button class="tab ${c===cat?'active':''}" onclick="cat='${c}';render()">${c}</button>`).join('');let list=filtered();pinned.innerHTML=list.filter(d=>d.pinned).map(card).join('')||'<p class="sub">No pinned documents.</p>';docs.innerHTML=list.map(card).join('')}function openDoc(id){editing=id;let d=getStore('ypo_docs',[]).find(x=>x.id===id)||{title:'',category:'Bylaws',description:'',url:'',date:new Date().toISOString().slice(0,10),version:'1.0',pinned:false};modal.classList.remove('hidden');modal.innerHTML=`<div class="modal"><h2>${id?'Edit':'Add'} Document</h2><div class="form-grid"><input id="title" class="input" placeholder="Title" value="${escapeHtml(d.title)}"><select id="category" class="input">${cats.filter(c=>c!=='All').map(c=>`<option ${d.category===c?'selected':''}>${c}</option>`)}</select><input id="url" class="input" placeholder="URL or file link" value="${escapeHtml(d.url)}"><input id="date" type="date" class="input" value="${d.date}"><input id="version" class="input" placeholder="Version" value="${escapeHtml(d.version)}"><label class="check"><input id="pinnedBox" type="checkbox" ${d.pinned?'checked':''}> Pinned / featured</label><textarea id="description" class="input full" placeholder="Description">${escapeHtml(d.description)}</textarea></div><div class="modal-actions"><button class="btn" onclick="modal.classList.add('hidden')">Cancel</button><button class="btn primary" onclick="save()">Save</button></div></div>`}function save(){let a=getStore('ypo_docs',[]),obj={id:editing||uid('doc'),title:title.value,category:category.value,description:description.value,url:url.value,date:date.value,version:version.value,pinned:pinnedBox.checked};editing?a=a.map(x=>x.id===editing?obj:x):a.push(obj);setStore('ypo_docs',a);modal.classList.add('hidden');render();toast('Document saved')}function pin(id){let a=getStore('ypo_docs',[]);a=a.map(d=>d.id===id?{...d,pinned:!d.pinned}:d);setStore('ypo_docs',a);render();toast('Updated')}function del(id){setStore('ypo_docs',getStore('ypo_docs',[]).filter(x=>x.id!==id));render();toast('Document deleted')}q.oninput=render;render()</script></body></html>
