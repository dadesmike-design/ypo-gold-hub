<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Members</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="container"><div class="hero"><div><h1>Member Directory</h1><p class="sub">Member records, roles, status, and YPO Gold eligibility.</p></div><button class="btn primary" onclick="openMem()">Add Member</button></div><div class="toolbar"><input id="q" class="input" style="max-width:300px" placeholder="Search name/company"><select id="roleF" class="input" style="max-width:210px"></select><select id="statusF" class="input" style="max-width:210px"><option>All Statuses</option><option>Active</option><option>Alumni</option><option>Prospective</option></select><button class="btn" onclick="csv('ypo-members.csv',filtered())">Export CSV</button></div><div id="counts" class="toolbar"></div><div class="panel table-wrap"><table class="table"><thead><tr><th>Name</th><th>Company / Title</th><th>Contact</th><th>Age</th><th>Role</th><th>Status</th><th></th></tr></thead><tbody id="rows"></tbody></table></div></main><div id="modal" class="modal-backdrop hidden"></div><script src="auth.js"></script><script>loadNav('members');footer();let editing=null;function initFilters(){roleF.innerHTML='<option>All Roles</option><option>No Role</option>'+ROLES.map(r=>`<option>${r}</option>`).join('')}function filtered(){let s=q.value.toLowerCase();return getStore('ypo_members',[]).filter(m=>(!s||(`${m.first} ${m.last} ${m.company}`).toLowerCase().includes(s))&&(roleF.value==='All Roles'||(roleF.value==='No Role'&&!m.role)||m.role===roleF.value)&&(statusF.value==='All Statuses'||m.status===statusF.value))}function elig(a){return a>=45?'<span class="badge green">✓ Gold</span>':a>=43?'<span class="badge amber">Approaching</span>':'<span class="badge">Not Yet</span>'}function render(){let all=getStore('ypo_members',[]);counts.innerHTML=['Active','Alumni','Prospective'].map(s=>`<span class="badge">${s}: ${all.filter(m=>m.status===s).length}</span>`).join('');rows.innerHTML=filtered().map(m=>{let a=age(m.dob);return `<tr><td><b>${escapeHtml(m.first)} ${escapeHtml(m.last)}</b><br><span class="sub">Joined ${m.join||'—'}</span></td><td>${escapeHtml(m.company)}</td><td>${escapeHtml(m.email)}<br>${escapeHtml(m.phone)}</td><td>${a} ${elig(a)}</td><td>${m.role||'—'}</td><td><span class="badge">${m.status}</span></td><td><button class="btn" onclick="openMem('${m.id}')">Edit</button><button class="btn danger" onclick="del('${m.id}')">Delete</button></td></tr>`}).join('')}function openMem(id){editing=id;let m=getStore('ypo_members',[]).find(x=>x.id===id)||{first:'',last:'',company:'',email:'',phone:'',dob:'',join:'',role:'',status:'Active',notes:''};modal.classList.remove('hidden');modal.innerHTML=`<div class="modal"><h2>${id?'Edit':'Add'} Member</h2><div class="form-grid"><input id="first" class="input" placeholder="First name" value="${escapeHtml(m.first)}"><input id="last" class="input" placeholder="Last name" value="${escapeHtml(m.last)}"><input id="company" class="input" placeholder="Company / Title" value="${escapeHtml(m.company)}"><input id="email" class="input" placeholder="Email" value="${escapeHtml(m.email)}"><input id="phone" class="input" placeholder="Phone" value="${escapeHtml(m.phone)}"><input id="dob" type="date" class="input" value="${m.dob}"><input id="join" type="date" class="input" value="${m.join}"><select id="role" class="input"><option value="">No Role</option>${ROLES.map(r=>`<option ${m.role===r?'selected':''}>${r}</option>`)}</select><select id="status" class="input"><option>Active</option><option>Alumni</option><option>Prospective</option></select><textarea id="notes" class="input full" placeholder="Notes">${escapeHtml(m.notes)}</textarea></div><div class="modal-actions"><button class="btn" onclick="modal.classList.add('hidden')">Cancel</button><button class="btn primary" onclick="save()">Save</button></div></div>`;status.value=m.status}function save(){let a=getStore('ypo_members',[]),obj={id:editing||uid('mem'),first:first.value,last:last.value,company:company.value,email:email.value,phone:phone.value,dob:dob.value,join:join.value,role:role.value,status:status.value,notes:notes.value};editing?a=a.map(x=>x.id===editing?obj:x):a.push(obj);setStore('ypo_members',a);modal.classList.add('hidden');render();toast('Member saved')}function del(id){setStore('ypo_members',getStore('ypo_members',[]).filter(x=>x.id!==id));render();toast('Member deleted')}q.oninput=roleF.onchange=statusF.onchange=render;initFilters();render()</script></body></html>
