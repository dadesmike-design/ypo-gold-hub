<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Training</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="container"><div class="hero"><div><h1>Role Training Modules</h1><p class="sub">Board role responsibilities, checklists, resources, and notes.</p></div><select id="filter" class="input" style="max-width:260px"></select></div><div id="roles"></div></main><script src="auth.js"></script><script>loadNav('training');footer();const desc={};ROLES.forEach(r=>desc[r]=`Key responsibilities for the ${r}: support chapter governance, communicate priorities, document decisions, and keep the board aligned on member value.`);const labels=['Review annual responsibilities','Complete onboarding conversation','Confirm current-year priorities'];function render(){filter.innerHTML='<option>All Roles</option>'+ROLES.map(r=>`<option>${r}</option>`).join('');let data=getStore('ypo_training',{}),show=filter.value||'All Roles';roles.innerHTML=ROLES.filter(r=>show==='All Roles'||r===show).map(r=>{let d=data[r]||{checks:[],resources:[],notes:''};return `<section class="accordion"><button class="acc-head"><div><h2>${r}</h2><p class="sub">${desc[r]}</p></div><span class="chev">⌄</span></button><div class="acc-body"><h3>Training Checklist</h3>${labels.map((l,i)=>`<label class="check"><input type="checkbox" data-role="${r}" data-i="${i}" ${d.checks[i]?'checked':''}> ${l}</label>`).join('')}<h3>Resources</h3><div>${(d.resources||[]).map((x,i)=>`<div class="resource"><a href="${escapeHtml(x.url)}" target="_blank">${escapeHtml(x.title)}</a><button class="btn danger" onclick="removeRes('${r}',${i})">Remove</button></div>`).join('')}</div><div class="form-grid"><input class="input" id="title-${r}" placeholder="Resource title"><input class="input" id="url-${r}" placeholder="URL or file link"></div><button class="btn" onclick="addRes('${r}')">Add Resource</button><h3>Notes</h3><textarea data-note="${r}" class="input">${escapeHtml(d.notes||'')}</textarea></div></section>`}).join('');document.querySelectorAll('.acc-head').forEach(b=>b.onclick=()=>b.parentElement.classList.toggle('open'));document.querySelectorAll('[type=checkbox]').forEach(c=>c.onchange=saveChecks);document.querySelectorAll('[data-note]').forEach(n=>n.oninput=e=>{let all=getStore('ypo_training',{});all[e.target.dataset.note].notes=e.target.value;setStore('ypo_training',all)});}function saveChecks(e){let all=getStore('ypo_training',{}),r=e.target.dataset.role;all[r].checks[e.target.dataset.i]=e.target.checked;setStore('ypo_training',all);toast('Saved')}function addRes(r){let all=getStore('ypo_training',{}),t=document.getElementById('title-'+r).value,u=document.getElementById('url-'+r).value;if(!t||!u)return;all[r].resources.push({title:t,url:u});setStore('ypo_training',all);toast('Resource added');render()}function removeRes(r,i){let all=getStore('ypo_training',{});all[r].resources.splice(i,1);setStore('ypo_training',all);render();toast('Removed')}filter.onchange=render;render()</script></body></html>
