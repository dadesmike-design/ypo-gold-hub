<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Events</title><link rel="stylesheet" href="style.css"></head><body><div id="nav"></div><main class="container"><div class="hero"><div><h1>Event Tracker</h1><p class="sub">Add, score, filter, and export chapter events.</p></div><button class="btn primary" onclick="openEvent()">Add Event</button></div><div class="toolbar"><select id="statusF" class="input" style="max-width:210px"><option>All Statuses</option><option>Upcoming</option><option>Completed</option><option>Cancelled</option></select><select id="typeF" class="input" style="max-width:210px"><option>All Types</option><option>Forum</option><option>Learning</option><option>Social</option><option>Board Meeting</option><option>Gold Summit</option><option>Other</option></select><button class="btn" onclick="csv('ypo-events.csv',filtered())">Export CSV</button></div><div class="panel table-wrap"><table class="table"><thead><tr><th onclick="sortBy='date';render()">Date</th><th>Event</th><th onclick="sortBy='type';render()">Type</th><th>Location</th><th>Attendance</th><th onclick="sortBy='score';render()">Score</th><th>Status</th><th></th></tr></thead><tbody id="rows"></tbody></table></div></main><div id="modal" class="modal-backdrop hidden"></div><script src="auth.js"></script><script>loadNav('events');footer();let sortBy='date',editing=null;function filtered(){let a=getStore('ypo_events',[]).filter(e=>(statusF.value==='All Statuses'||e.status===statusF.value)&&(typeF.value==='All Types'||e.type===typeF.value));return a.sort((x,y)=>String(x[sortBy]).localeCompare(String(y[sortBy])))}function render(){rows.innerHTML=filtered().map(e=>`<tr><td>${e.date}</td><td><b>${escapeHtml(e.name)}</b><br><span class="sub">${escapeHtml(e.notes||'')}</span></td><td>${e.type}</td><td>${escapeHtml(e.location)}</td><td>${e.attendance}</td><td><span class="badge ${scoreBadge(e.score)}">${e.score||'—'}</span></td><td><span class="badge">${e.status}</span></td><td><button class="btn" onclick="openEvent('${e.id}')">Edit</button><button class="btn danger" onclick="del('${e.id}')">Delete</button></td></tr>`).join('')}function openEvent(id){editing=id;let e=getStore('ypo_events',[]).find(x=>x.id===id)||{name:'',date:'',location:'',type:'Forum',attendance:0,score:1,notes:'',status:'Upcoming'};modal.classList.remove('hidden');modal.innerHTML=`<div class="modal"><h2>${id?'Edit':'Add'} Event</h2><div class="form-grid"><input id="name" class="input" placeholder="Event name" value="${escapeHtml(e.name)}"><input id="date" type="date" class="input" value="${e.date}"><input id="location" class="input" placeholder="Location" value="${escapeHtml(e.location)}"><select id="type" class="input">${['Forum','Learning','Social','Board Meeting','Gold Summit','Other'].map(t=>`<option ${e.type===t?'selected':''}>${t}</option>`)}</select><input id="attendance" type="number" class="input" placeholder="Attendance" value="${e.attendance}"><input id="score" type="number" min="1" max="10" class="input" placeholder="Score" value="${e.score}"><select id="status" class="input"><option>Upcoming</option><option>Completed</option><option>Cancelled</option></select><textarea id="notes" class="input full" placeholder="Notes">${escapeHtml(e.notes)}</textarea></div><div class="modal-actions"><button class="btn" onclick="modal.classList.add('hidden')">Cancel</button><button class="btn primary" onclick="save()">Save</button></div></div>`;status.value=e.status}function save(){let a=getStore('ypo_events',[]),obj={id:editing||uid('ev'),name:name.value,date:date.value,location:location.value,type:type.value,attendance:attendance.value,score:score.value,notes:notes.value,status:status.value};editing?a=a.map(x=>x.id===editing?obj:x):a.push(obj);setStore('ypo_events',a);modal.classList.add('hidden');render();toast('Event saved')}function del(id){setStore('ypo_events',getStore('ypo_events',[]).filter(x=>x.id!==id));render();toast('Event deleted')}statusF.onchange=typeF.onchange=render;render()</script></body></html>
